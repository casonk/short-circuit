# Known downstream repositories for short-circuit.
# Paths are relative to the portfolio root.
# Track explicit code/config/operational integrations here, not generic
# shared-utility mentions from AGENTS.md alone.

[utility_repo]
path = "./util-repos/short-circuit"

[downstream_repos]
tracking_basis = "explicit code/config/operational integrations"
paths = [
  "./util-repos/snowbridge",  # README.md and host-setup docs use short-circuit for WireGuard installation
]
