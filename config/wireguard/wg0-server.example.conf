# short-circuit WireGuard public-vpn server example
#
# Profile: wireguard-public-vpn
# Replace every placeholder before use. Keep the real private key outside git.
# This profile exposes only the WireGuard UDP listener publicly. SMB, HTTPS,
# and SSH remain behind the VPN and are reached on the host's tunnel IP.

[Interface]
Address = 10.99.0.1/24
ListenPort = 51820
PrivateKey = <server-private-key>

# Recommended firewall posture:
# - allow UDP 51820 inbound to this host
# - allow SMB, HTTPS, and SSH only from the WireGuard interface, LAN, or both
#   as intended

[Peer]
# Client peer (e.g. iPhone, laptop, or other mobile device)
PublicKey = <client-public-key>
AllowedIPs = 10.99.0.2/32
PersistentKeepalive = 25

# If you want the client to reach the whole home LAN through this host instead
# of only the host itself, use the wireguard-lan-vpn profile templates.
