# short-circuit WireGuard public-vpn client peer example
#
# Profile: wireguard-public-vpn
# Import the finished file into the WireGuard app on your client device by QR
# code or file transfer after replacing every placeholder.

[Interface]
Address = 10.99.0.2/32
PrivateKey = <client-private-key>
# setup_wireguard.sh configures dnsmasq on the server to answer this address
# for private hostnames. Set --dns-hostname to match the name your services use.
DNS = 10.99.0.1

[Peer]
PublicKey = <server-public-key>
Endpoint = <wireguard-endpoint-hostname-or-ip>:51820
AllowedIPs = 10.99.0.1/32
PersistentKeepalive = 25

# Host-only access after connecting:
# SMB:   smb://10.99.0.1
# HTTPS: https://<private-hostname>
# SSH:   ssh user@10.99.0.1
